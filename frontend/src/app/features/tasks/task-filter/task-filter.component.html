<section class="filter-shell">
  <div class="search-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-icon matPrefix>search</mat-icon>
      <input
        matInput
        #searchInput
        placeholder="Search tasks"
        aria-label="Search tasks"
        [formControl]="form.controls.search"
      />
    </mat-form-field>

    <mat-form-field appearance="outline" class="sort-field">
      <mat-label>Sort by</mat-label>
      <mat-select [formControl]="form.controls.sort">
        <mat-option *ngFor="let option of sortOptions" [value]="option.value">
          {{ option.label }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="date-field">
      <mat-label>Due before</mat-label>
      <input matInput [matDatepicker]="picker" [formControl]="form.controls.dueBefore" />
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <button mat-stroked-button type="button" (click)="clearFilters()">
      Clear
    </button>
  </div>

  <div class="chip-row">
    <div class="chip-group">
      <span class="chip-label">Status</span>
      <mat-chip-listbox [formControl]="form.controls.status" aria-label="Filter by status">
        <mat-chip-option [value]="null">All</mat-chip-option>
        <mat-chip-option *ngFor="let status of statuses" [value]="status">
          {{ status }}
        </mat-chip-option>
      </mat-chip-listbox>
    </div>

    <div class="chip-group">
      <span class="chip-label">Priority</span>
      <mat-chip-listbox [formControl]="form.controls.priority" aria-label="Filter by priority">
        <mat-chip-option [value]="null">All</mat-chip-option>
        <mat-chip-option *ngFor="let priority of priorities" [value]="priority">
          {{ priority }}
        </mat-chip-option>
      </mat-chip-listbox>
    </div>
  </div>
</section>
