version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: taskapp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: taskapp-api
    environment:
      ASPNETCORE_URLS: http://+:5000
      TASKAPP_CONNECTION: Host=postgres;Port=5432;Database=taskapp;Username=postgres;Password=postgres
    ports:
      - "5050:5000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: taskapp-web
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
